<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CLI Command Reference</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
/* ── Dark theme ── */
[data-theme="dark"] {
  --accent:#4fc3f7; --bg:#1a1d23; --bg2:#22262e; --bg3:#2a2f3a;
  --border:#333844; --text:#e0e4ef; --muted:#7a8499;
  --card-bg:#22262e; --input-bg:#2a2f3a; --input-border:#333844;
  --badge-text:#fff; --hr-color:#333844;
}
/* ── Light theme ── */
[data-theme="light"] {
  --accent:#0277bd; --bg:#f4f6fa; --bg2:#ffffff; --bg3:#eef1f7;
  --border:#d0d7e3; --text:#1a2030; --muted:#6b7794;
  --card-bg:#ffffff; --input-bg:#eef1f7; --input-border:#c5cede;
  --badge-text:#fff; --hr-color:#d0d7e3;
}
body { background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; margin:0; }
#sidebar {
  width:280px; min-width:220px; max-width:320px; flex-shrink:0;
  height:100vh; overflow-y:auto; background:var(--bg2);
  border-right:1px solid var(--border); padding:12px 8px;
  position:sticky; top:0;
}
#main { flex:1; overflow-y:auto; padding:20px; height:100vh; }
.db-item {
  padding:8px 10px; border-radius:6px; cursor:pointer;
  margin-bottom:4px; border:1px solid transparent;
  background:transparent; transition:.12s;
}
.db-item:hover { background:var(--bg3); }
.db-item.active { background:var(--bg3); border-color:var(--accent); }
.db-name { font-size:.84rem; font-weight:600; color:var(--text); }
.db-meta { font-size:.72rem; color:var(--muted); margin-top:2px; }
.cmd-row {
  display:flex; align-items:flex-start; gap:.4rem;
  padding:3px 6px; border-radius:4px;
}
.cmd-row:hover { background:var(--bg3); }
.cmd-key { color:var(--accent); font-family:monospace; font-size:.84rem; white-space:nowrap; min-width:130px; }
.cmd-desc { color:var(--muted); font-size:.77rem; flex:1; }
.tag { display:inline-block; font-size:.6rem; padding:1px 5px; border-radius:3px; margin-left:2px; color:#fff; white-space:nowrap; }
.toggle-btn { background:none; border:none; color:var(--muted); font-size:.7rem; padding:0; min-width:14px; line-height:1; cursor:pointer; }
.tree-children { display:block; }
.tree-children.collapsed { display:none; }
.cmd-node { border-left:2px solid var(--border); margin-left:4px; }
.cmd-node.d0 { border-left:none; margin-left:0; }
#searchBox {
  background:var(--input-bg); border:1px solid var(--input-border);
  color:var(--text); border-radius:6px; padding:6px 10px;
  font-size:.82rem; width:100%; outline:none;
}
#searchBox:focus { border-color:var(--accent); }
.tag-filter {
  cursor:pointer; font-size:.7rem; padding:2px 7px; border-radius:3px;
  color:#fff; border:1px solid transparent; opacity:.65; display:inline-block; margin:2px;
}
.tag-filter.active { opacity:1; border-color:rgba(255,255,255,.35); }
.sys-badge {
  font-size:.7rem; padding:2px 8px; border-radius:4px;
  font-weight:700; display:inline-block; margin:6px 0 4px;
}
.hl { background:#ff0; color:#000; border-radius:2px; }
#themeBtn {
  background:none; border:1px solid var(--border); color:var(--muted);
  border-radius:5px; padding:2px 7px; font-size:.75rem; cursor:pointer;
}
#themeBtn:hover { border-color:var(--accent); color:var(--text); }
</style>
</head>
<body>
<div style="display:flex;height:100vh;overflow:hidden">

<div id="sidebar">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <span style="font-weight:700;font-size:.95rem;color:var(--accent)">
      <i class="bi bi-terminal-split me-1"></i>CLI Reference
    </span>
    <button id="themeBtn" onclick="toggleTheme()" title="Toggle light/dark">
      <i class="bi bi-sun" id="themeIcon"></i>
    </button>
  </div>
  <input id="searchBox" type="search" placeholder="Search commands&#8230;" autocomplete="off">
  <div style="font-size:.68rem;color:var(--muted);margin-top:4px">Generated 2026-05-02 23:36</div>
  <hr style="border-color:var(--border);margin:10px 0">
  <div id="dbList"></div>
</div>

<div id="main">
  <div id="welcome" style="text-align:center;padding-top:80px;color:var(--muted)">
    <i class="bi bi-terminal" style="font-size:3rem;opacity:.25"></i>
    <p style="margin-top:12px">Select a command database from the sidebar.</p>
  </div>
  <div id="dbView" style="display:none">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px">
      <span id="vSystem"></span>
      <div>
        <span id="vModel" style="font-size:1.1rem;font-weight:700"></span>
        <span id="vFirmware" class="badge bg-secondary ms-2" style="font-size:.7rem"></span>
      </div>
      <span id="vCount" style="font-size:.79rem;color:var(--muted)"></span>
      <span id="vIp"    style="font-size:.79rem;color:var(--muted)"></span>
    </div>
    <div id="tagFilters" style="margin-bottom:12px"></div>
    <div id="searchResults" style="display:none">
      <div id="searchCount" style="font-size:.74rem;color:var(--muted);margin-bottom:6px"></div>
      <div id="searchList"></div>
    </div>
    <div id="treeContainer"></div>
    <div id="noResults" style="display:none;text-align:center;padding:40px;color:var(--muted)">
      <i class="bi bi-search" style="font-size:2rem;opacity:.3"></i>
      <p style="margin-top:8px">No commands found.</p>
    </div>
  </div>
</div>
</div>

eer IP address.","_tags":["debug","ap-management"]},"debug":{"_desc":"Manages system debug options.","_tags":["debug"]},"eping":{"_desc":"Send Ethernet-over-IP echo packets to a specified mobility peer IP address.","_tags":["debug","interfaces","ap-management"]},"grep":{"_desc":"Print lines matching a pattern."},"help":{"_desc":"Help"},"linktest":{"_desc":"Perform a link test to a specified MAC address.","_tags":["wireless-rf"]},"logout":{"_desc":"Exit this session. Any unsaved changes are lost.","_tags":["save-config","syslog"]},"ping":{"_desc":"Send ICMP echo packets to a specified IP address.","_tags":["debug"]},"reset":{"_desc":"Reboot (hard reload) options.","_tags":["stats","dangerous"]},"restart":{"_desc":"Restart (soft reload) the switch.","_tags":["stats","dangerous"]},"save":{"_desc":"Save switch configurations.","_tags":["save-config"]},"show":{"_desc":"Display switch options and settings."},"test":{"_desc":"Test trigger commands"},"transfer":{"_desc":"Transfer a file to or from the switch.","_tags":["backup"]}}}];
const TAG_COLORS = {
  dangerous:"#dc3545",  "factory-reset":"#dc3545",
  stats:"#0dcaf0",      "wireless-rf":"#0dcaf0",   "version-info":"#0dcaf0", "ap-management":"#0dcaf0",
  "snmp-config":"#ffc107", auth:"#ffc107",          acl:"#ffc107",
  backup:"#0d6efd",     syslog:"#0d6efd",
  "save-config":"#198754",
  debug:"#6c757d",      vlan:"#6c757d",             interfaces:"#6c757d",
  ntp:"#6c757d",        topology:"#6c757d",         dhcp:"#6c757d",
  crypto:"#6c757d",     qos:"#6c757d"
};
const SYS_LABELS = {
  "wlc-controller": ["WLC Controller","#0dcaf0","#000"],
  "ap-shell":       ["AP IOS Shell",  "#198754","#fff"]
};

let curDb = null, activeTag = null;

function tc(tag) { return TAG_COLORS[tag] || "#6c757d"; }
function tagBadge(tag) { return '<span class="tag" style="background:'+tc(tag)+'">'+tag+'</span>'; }

// ── Theme ──────────────────────────────────────────────────────────────────
function toggleTheme() {
  const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeIcon').className = t === 'dark' ? 'bi bi-sun' : 'bi bi-moon';
  try { localStorage.setItem('cli-ref-theme', t); } catch(e) {}
}
(function() {
  try {
    const saved = localStorage.getItem('cli-ref-theme');
    if (saved && saved !== 'dark') {
      document.documentElement.setAttribute('data-theme', saved);
      document.getElementById('themeIcon').className = 'bi bi-moon';
    }
  } catch(e) {}
})();

// ── Sidebar ────────────────────────────────────────────────────────────────
function buildSidebar() {
  const groups = {};
  DATABASES.forEach(function(db) {
    var sys = db.system || 'other';
    if (!groups[sys]) groups[sys] = [];
    groups[sys].push(db);
  });

  var html = '';
  Object.keys(groups).forEach(function(sys) {
    var info = SYS_LABELS[sys] || [sys, '#6c757d', '#fff'];
    html += '<div class="sys-badge" style="background:'+info[1]+';color:'+info[2]+'">'+info[0]+'</div>';
    groups[sys].forEach(function(db) {
      html += '<div class="db-item" data-slug="'+db.slug+'">'
        + '<div class="db-name">'+db.model+'</div>'
        + '<div class="db-meta"><i class="bi bi-cpu"></i> '+db.firmware
        + ' &middot; <i class="bi bi-terminal"></i> '+db.command_count+' cmds</div>'
        + '</div>';
    });
  });
  document.getElementById('dbList').innerHTML = html;
}

// ── Open database ──────────────────────────────────────────────────────────
function openDb(slug) {
  curDb = null;
  for (var i = 0; i < DATABASES.length; i++) {
    if (DATABASES[i].slug === slug) { curDb = DATABASES[i]; break; }
  }
  if (!curDb) return;
  activeTag = null;

  document.querySelectorAll('.db-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.slug === slug);
  });

  var info = SYS_LABELS[curDb.system] || [curDb.system || 'Other', '#6c757d', '#fff'];
  document.getElementById('vSystem').innerHTML =
    '<span class="sys-badge" style="background:'+info[1]+';color:'+info[2]+'">'+info[0]+'</span>';
  document.getElementById('vModel').textContent    = curDb.model;
  document.getElementById('vFirmware').textContent = curDb.firmware;
  document.getElementById('vCount').innerHTML = '<i class="bi bi-terminal me-1"></i>'+curDb.command_count+' commands';
  document.getElementById('vIp').innerHTML = curDb.source_ip
    ? '<i class="bi bi-hdd-network me-1"></i>'+curDb.source_ip : '';

  var tf = '<span class="tag-filter active" data-tag="" style="background:#6c757d">All</span>';
  curDb.tags.forEach(function(tag) {
    tf += '<span class="tag-filter" data-tag="'+tag+'" style="background:'+tc(tag)+'">'+tag+'</span>';
  });
  document.getElementById('tagFilters').innerHTML = tf;

  renderTree(curDb.commands);
  document.getElementById('welcome').style.display       = 'none';
  document.getElementById('dbView').style.display        = 'block';
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('treeContainer').style.display = 'block';
  document.getElementById('noResults').style.display     = 'none';
  document.getElementById('searchBox').value = '';
}

// ── Tree ───────────────────────────────────────────────────────────────────
function renderNode(key, val, depth) {
  if (key.charAt(0) === '_' || typeof val !== 'object' || val === null) return '';
  var desc = val._desc || '';
  var tags = val._tags || [];
  var hasChildren = false;
  Object.keys(val).forEach(function(k) { if (k.charAt(0) !== '_') hasChildren = true; });

  var indent = depth * 18;
  var toggle = hasChildren
    ? '<button class="toggle-btn" onclick="tog(this)"><i class="bi bi-chevron-down"></i></button>'
    : '<span style="min-width:14px;display:inline-block"></span>';
  var tagHtml = tags.map(tagBadge).join('');
  var descHtml = desc ? '<span class="cmd-desc">'+desc+'</span>' : '';

  var children = '';
  if (hasChildren) {
    Object.keys(val).forEach(function(k) { children += renderNode(k, val[k], depth+1); });
  }

  return '<div class="cmd-node d'+Math.min(depth,1)+'" data-tags="'+tags.join(' ')+'"'
    + ' style="padding-left:'+indent+'px">'
    + '<div class="cmd-row">'+toggle
    + '<code class="cmd-key">'+key+'</code>'+descHtml+tagHtml+'</div>'
    + (hasChildren ? '<div class="tree-children">'+children+'</div>' : '')
    + '</div>';
}

function renderTree(commands) {
  var html = '';
  Object.keys(commands).forEach(function(k) { html += renderNode(k, commands[k], 0); });
  document.getElementById('treeContainer').innerHTML = html || '<p style="color:var(--muted)">No commands.</p>';
}

function tog(btn) {
  var ch = btn.closest('.cmd-node').querySelector('.tree-children');
  if (!ch) return;
  var c = ch.classList.toggle('collapsed');
  btn.querySelector('i').className = c ? 'bi bi-chevron-right' : 'bi bi-chevron-down';
}

// ── Tag filter ─────────────────────────────────────────────────────────────
function filterTag(tag, el) {
  activeTag = tag;
  document.querySelectorAll('.tag-filter').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
  var q = document.getElementById('searchBox').value.trim();
  if (q) { doSearch(q); return; }
  document.querySelectorAll('#treeContainer .cmd-node').forEach(function(node) {
    if (!tag) { node.style.display = ''; return; }
    node.style.display = node.dataset.tags.split(' ').indexOf(tag) >= 0 ? '' : 'none';
  });
  var vis = [].filter.call(document.querySelectorAll('#treeContainer .cmd-node'),
    function(n) { return n.style.display !== 'none'; }).length;
  document.getElementById('noResults').style.display = vis ? 'none' : 'block';
}

// ── Search ─────────────────────────────────────────────────────────────────
function flatTree(tree, prefix) {
  var res = [];
  Object.keys(tree).forEach(function(k) {
    if (k.charAt(0) === '_' || typeof tree[k] !== 'object') return;
    var path = prefix ? prefix+' '+k : k;
    res.push({ path:path, desc:tree[k]._desc||'', tags:tree[k]._tags||[] });
    res = res.concat(flatTree(tree[k], path));
  });
  return res;
}

function esc(s) { return s.replace(/[&<>"]/g, function(c) {
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

function doSearch(q) {
  if (!curDb || !q) {
    document.getElementById('searchResults').style.display = 'none';
    document.getElementById('treeContainer').style.display = curDb ? 'block' : 'none';
    return;
  }
  var ql = q.toLowerCase();
  var re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
  function hl(s) { return esc(s).replace(re, function(m) { return '<span class="hl">'+m+'</span>'; }); }

  var flat = flatTree(curDb.commands, '');
  if (activeTag) flat = flat.filter(function(c) { return c.tags.indexOf(activeTag) >= 0; });
  var hits = flat.filter(function(c) {
    return c.path.toLowerCase().indexOf(ql) >= 0
        || c.desc.toLowerCase().indexOf(ql) >= 0
        || c.tags.join(' ').indexOf(ql) >= 0;
  });

  document.getElementById('searchCount').textContent =
    hits.length + ' result'+(hits.length!==1?'s':'')+' for "'+q+'"';

  var listHtml = hits.slice(0,300).map(function(c) {
    return '<div style="padding:4px 8px;border-bottom:1px solid var(--border)">'
      + '<code style="color:var(--accent);font-size:.82rem">'+hl(c.path)+'</code>'
      + (c.desc ? '<span style="color:var(--muted);font-size:.75rem;margin-left:8px">'+hl(c.desc)+'</span>' : '')
      + c.tags.map(tagBadge).join('')+'</div>';
  }).join('');

  document.getElementById('searchList').innerHTML   = listHtml;
  document.getElementById('searchResults').style.display = 'block';
  document.getElementById('treeContainer').style.display = 'none';
  document.getElementById('noResults').style.display     = hits.length ? 'none' : 'block';
}

document.getElementById('searchBox').addEventListener('input', function(e) {
  var q = e.target.value.trim();
  if (!q) {
    document.getElementById('searchResults').style.display = 'none';
    document.getElementById('treeContainer').style.display = curDb ? 'block' : 'none';
    document.getElementById('noResults').style.display     = 'none';
    if (activeTag) filterTag(activeTag, document.querySelector('.tag-filter.active'));
  } else {
    doSearch(q);
  }
});

// ── Init ───────────────────────────────────────────────────────────────────
buildSidebar();

document.getElementById('dbList').addEventListener('click', function(e) {
  var item = e.target.closest('.db-item');
  if (item && item.dataset.slug) openDb(item.dataset.slug);
});

document.getElementById('dbView').addEventListener('click', function(e) {
  var btn = e.target.closest('.tag-filter');
  if (btn) filterTag(btn.dataset.tag || null, btn);
});

if (DATABASES.length === 1) openDb(DATABASES[0].slug);
</script>
</body>
</html>
