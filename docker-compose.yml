name: netdoc

# UWAGA DLA NOWYCH INSTALACJI:
# 1. Skopiuj konfiguracje:   copy .env.example .env   (Windows cmd)
#                            cp .env.example .env     (Linux/macOS)
# 2. Stworz katalogi:        mkdir data logs          (oba systemy)
# 3. Uruchom Docker Desktop i upewnij sie ze dziala:  docker info
# 4. Windows: w Docker Desktop -> Settings -> Advanced ->
#    wlacz "Allow the default Docker socket to be used"
#    (wymagane przez serwisy web i promtail)
# 5. Pierwsze uruchomienie:  docker compose up -d --build
#    (moze trwac 10-20 min — pobieranie obrazow + budowanie)

x-log-limit: &log-limit
  logging:
    driver: "json-file"
    options:
      max-size: "1m"
      max-file: "1"

services:

  postgres:
    image: postgres:16-alpine
    container_name: netdoc-postgres
    restart: unless-stopped
    <<: *log-limit
    environment:
      TZ: "${TZ:-UTC}"
      POSTGRES_DB: netdoc
      POSTGRES_USER: netdoc
      POSTGRES_PASSWORD: netdoc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netdoc"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: netdoc-prometheus
    profiles: ["monitoring"]
    restart: unless-stopped
    <<: *log-limit
    environment:
      TZ: "${TZ:-UTC}"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  loki:
    image: grafana/loki:3.2.0
    container_name: netdoc-loki
    profiles: ["monitoring"]
    restart: unless-stopped
    <<: *log-limit
    environment:
      TZ: "${TZ:-UTC}"
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:3.2.0
    container_name: netdoc-promtail
    profiles: ["monitoring"]
    restart: unless-stopped
    <<: *log-limit
    environment:
      TZ: "${TZ:-UTC}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/promtail/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.4.0
    container_name: netdoc-grafana
    profiles: ["monitoring"]
    restart: unless-stopped
    <<: *log-limit
    environment:
      TZ: "${TZ:-UTC}"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: netdoc
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: "http://localhost/grafana/"
      GF_SERVER_DOMAIN: "localhost"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"   # iframe w NetDoc
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    expose:
      - "3000"   # tylko wewnętrznie — nginx proxy, nie wystawiamy portu na hosta
    depends_on:
      - postgres
      - prometheus
      - loki

  api:
    build: .
    container_name: netdoc-api
    restart: unless-stopped
    <<: *log-limit
    command: uvicorn netdoc.api.main:app --host 0.0.0.0 --port 8000 --workers 1
    environment:
      TZ: "${TZ:-UTC}"
      DB_URL: postgresql+psycopg2://netdoc:netdoc@postgres:5432/netdoc
      REQUIRE_POSTGRES: "1"
    env_file:
      - path: .env
        required: false   # dziala bez .env — uzyj do nadpisania domyslnych wartosci
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - wazuh_logs:/wazuh_logs:ro   # Wazuh alerts.json for security dashboard
    ports:
      - "8000:8000"
    cap_add:
      - NET_RAW
      - NET_ADMIN
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: .
    container_name: netdoc-web
    restart: unless-stopped
    <<: *log-limit
    command: python -m flask --app netdoc.web.app run --host 0.0.0.0 --port 5000
    environment:
      TZ: "${TZ:-UTC}"
      DB_URL: postgresql+psycopg2://netdoc:netdoc@postgres:5432/netdoc
      REQUIRE_POSTGRES: "1"
      NETDOC_API_URL: http://api:8000
      FLASK_ENV: production
      FLASK_SECRET_KEY: netdoc-change-in-production
      TEMPLATES_AUTO_RELOAD: "true"
      AGENT_ENABLED: "1"          # ustaw 0 aby wylaczyc chatbota
      LAB_COMPOSE_FILE: /app/docker-compose.lab.yml
      GRAFANA_URL: "/grafana"     # relatywny — nginx serwuje /grafana/ → Grafana
    env_file:
      - path: .env
        required: false   # dziala bez .env — uzyj do nadpisania domyslnych wartosci                       # ANTHROPIC_API_KEY pobierany z .env
    volumes:
      - ./netdoc:/app/netdoc:ro
      - ./netdoc_pro:/app/netdoc_pro:ro
      - ./docker-compose.lab.yml:/app/docker-compose.lab.yml:ro
      - ./config:/app/config:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - ./logs:/app/logs
      - ./device_passports:/app/device_passports
      - wazuh_logs:/wazuh_logs:ro   # Wazuh alerts.json for security dashboard
    expose:
      - "5000"   # tylko wewnętrznie — nginx proxy
    depends_on:
      postgres:
        condition: service_healthy


  ping-worker:
    build: .
    container_name: netdoc-ping
    profiles: ["workers"]
    restart: unless-stopped
    <<: *log-limit
    command: python run_ping.py
    environment:
      TZ: "${TZ:-UTC}"
      DB_URL: postgresql+psycopg2://netdoc:netdoc@postgres:5432/netdoc
      REQUIRE_POSTGRES: "1"
      PING_INTERVAL: "18"
      PING_WORKERS: "64"
      PING_METRICS_PORT: "8001"
    env_file:
      - path: .env
        required: false   # dziala bez .env — uzyj do nadpisania domyslnych wartosci
    ports:
      - "8001:8001"
    cap_add:
      - NET_RAW       # ICMP ping
    depends_on:
      postgres:
        condition: service_healthy

  snmp-worker:
    build: .
    container_name: netdoc-snmp
    profiles: ["workers"]
    restart: unless-stopped
    <<: *log-limit
    command: python run_snmp_worker.py
    environment:
      TZ: "${TZ:-UTC}"
      DB_URL: postgresql+psycopg2://netdoc:netdoc@postgres:5432/netdoc
      REQUIRE_POSTGRES: "1"
      SNMP_INTERVAL: "300"
      SNMP_WORKERS: "10"
      SNMP_METRICS_PORT: "8002"
    env_file:
      - path: .env
        required: false   # dziala bez .env — uzyj do nadpisania domyslnych wartosci
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy


  community-worker:
    build: .
    container_name: netdoc-community
    profiles: ["workers"]
    restart: unless-stopped
    <<: *log-limit
    command: python run_community_worker.py
    environment:
      TZ: "${TZ:-UTC}"
      DB_URL: postgresql+psycopg2://netdoc:netdoc@postgres:5432/netdoc
      REQUIRE_POSTGRES: "1"
      COMMUNITY_INTERVAL_S: "3600"
      COMMUNITY_WORKERS: "5"
      SNMP_TIMEOUT_S: "2"
      COMMUNITY_METRICS_PORT: "8006"
    env_file:
      - path: .env
        required: false   # dziala bez .env — uzyj do nadpisania domyslnych wartosci
    ports:
      - "8006:8006"
    depends_on:
      postgres:
        condition: service_healthy


  cred-worker:
    build: .
    container_name: netdoc-cred
    profiles: ["workers"]
    restart: unless-stopped
    <<: *log-limit
    command: python run_cred_worker.py
    environment:
      TZ: "${TZ:-UTC}"
      DB_URL: postgresql+psycopg2://netdoc:netdoc@postgres:5432/netdoc
      REQUIRE_POSTGRES: "1"
      CRED_INTERVAL_S: "60"
      CRED_SSH_WORKERS: "16"
      CRED_WEB_WORKERS: "16"
      CRED_RETRY_DAYS: "1"
      CRED_MAX_CREDS_PER_DEV: "9999"
      CRED_METRICS_PORT: "8003"
      CRED_VERBOSE: "1"
      CRED_PAIRS_PER_CYCLE: "1"
      CRED_MIN_DELAY_S: "2"
      CRED_MAX_DELAY_S: "10"
      CRED_DEVICE_TIMEOUT_S: "120"
      DB_POOL_SIZE: "20"
      DB_MAX_OVERFLOW: "20"
    env_file:
      - path: .env
        required: false   # dziala bez .env — uzyj do nadpisania domyslnych wartosci
    volumes:
      - ./logs:/app/logs
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy


  vuln-worker:
    build: .
    container_name: netdoc-vuln
    profiles: ["workers"]
    restart: unless-stopped
    <<: *log-limit
    command: python run_vuln_worker.py
    environment:
      TZ: "${TZ:-UTC}"
      DB_URL: postgresql+psycopg2://netdoc:netdoc@postgres:5432/netdoc
      REQUIRE_POSTGRES: "1"
      VULN_INTERVAL_S: "120"
      VULN_WORKERS: "16"
      VULN_METRICS_PORT: "8004"
    env_file:
      - path: .env
        required: false   # dziala bez .env — uzyj do nadpisania domyslnych wartosci
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy

  internet-worker:
    build: .
    container_name: netdoc-internet
    profiles: ["workers"]
    restart: unless-stopped
    <<: *log-limit
    command: python run_internet.py
    environment:
      TZ: "${TZ:-UTC}"
      DB_URL: postgresql+psycopg2://netdoc:netdoc@postgres:5432/netdoc
      REQUIRE_POSTGRES: "1"
      INET_CHECK_INTERVAL_S: "120"   # DNS + HTTP co 2 min
      INET_SPEED_INTERVAL_S: "1800"  # speed test co 30 min
      INET_SPEED_BYTES: "5242880"    # 5 MB
      INET_METRICS_PORT: "8005"
    env_file:
      - path: .env
        required: false   # dziala bez .env — uzyj do nadpisania domyslnych wartosci
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
    # Kontener ma domyslny dostep do internetu przez NAT — brak dodatkowej konfiguracji sieci

  # ─── Reverse proxy ───────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: netdoc-nginx
    restart: unless-stopped
    <<: *log-limit
    environment:
      TZ: "${TZ:-UTC}"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - web

  # ─── Syslog stack ────────────────────────────────────────────────────────────

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: netdoc-clickhouse
    restart: unless-stopped
    <<: *log-limit
    environment:
      TZ: "${TZ:-UTC}"
      CLICKHOUSE_DB: netdoc_logs
      CLICKHOUSE_USER: netdoc
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-netdoc}"
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
      - ./config/clickhouse/users.xml:/etc/clickhouse-server/users.d/netdoc.xml:ro
    ports:
      - "8123:8123"   # HTTP API (Grafana, curl)
      - "9000:9000"   # native protocol (Python clickhouse-driver)
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10

  rsyslog:
    profiles: ["syslog"]
    build:
      context: ./docker/rsyslog
      dockerfile: Dockerfile
    container_name: netdoc-rsyslog
    restart: unless-stopped
    <<: *log-limit
    # Port layout:
    #   UDP 514  — handled by run_syslog_relay.py on the Windows HOST.
    #   TCP 514  — handled by run_syslog_relay.py on the Windows HOST.
    #              Both preserve real sender IPs (bypass Docker NAT) and
    #              forward to port 5140 with real IP in HOSTNAME field.
    #   UDP 5140 — relay input from Windows host (localhost only).
    #
    # NOTE: TCP 514 is NOT mapped here — the host relay binds it directly.
    #       If you remove the relay, add "514:514/tcp" back here.
    ports:
      - "127.0.0.1:5140:5140/udp"
    environment:
      TZ: "${TZ:-UTC}"
    volumes:
      - ./config/rsyslog/rsyslog.conf:/etc/rsyslog.conf:ro
      - rsyslog_queue:/var/spool/rsyslog
    depends_on:
      - vector

  vector:
    image: timberio/vector:0.42.0-alpine
    container_name: netdoc-vector
    profiles: ["syslog"]
    restart: unless-stopped
    <<: *log-limit
    environment:
      TZ: "${TZ:-UTC}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-netdoc}"
    volumes:
      - ./config/vector/syslog.toml:/etc/vector/vector.toml:ro
    ports:
      - "6514:6514"     # TCP from rsyslog (internal)
      - "8688:8688"     # Vector API (health check)
    depends_on:
      clickhouse:
        condition: service_healthy
    command: ["--config", "/etc/vector/vector.toml"]

  # ─── Pro integrations (start with: docker compose --profile pro up -d) ──────

  ntopng:
    image: ntop/ntopng:latest
    container_name: netdoc-ntopng
    profiles: ["pro"]
    restart: unless-stopped
    <<: *log-limit
    environment:
      TZ: "${TZ:-UTC}"
    command: >
      --interface=any
      --http-port=3000
      --data-dir=/var/lib/ntopng
      ${NTOPNG_LICENSE:+--license=${NTOPNG_LICENSE}}
    volumes:
      - ntopng_data:/var/lib/ntopng
    ports:
      - "3001:3000"   # 3001 na hoście żeby nie kolidować z Grafaną (3000 wewnętrznie)
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # Na Linuxie: dodaj network_mode: host żeby sniffować fizyczny interfejs.
    # Na Windows/Docker Desktop: widzi tylko ruch wewnątrz Docker bridge.

  wazuh-manager:
    image: wazuh/wazuh-manager:4.9.2
    container_name: netdoc-wazuh
    profiles: ["pro"]
    restart: unless-stopped
    <<: *log-limit
    environment:
      TZ: "${TZ:-UTC}"
      WAZUH_MANAGER_MAX_AGENTS: "50"
    volumes:
      - wazuh_data:/var/ossec/data
      - wazuh_logs:/var/ossec/logs
      # Reguły NetDoc: skopiuj config/wazuh/netdoc_rules.xml do kontenera po inicjalizacji:
      # docker cp config/wazuh/netdoc_rules.xml netdoc-wazuh:/var/ossec/etc/rules/local_rules.xml
    ports:
      - "1514:1514/udp"   # agent protocol
      - "1515:1515"       # agent enrollment
      - "5141:514/udp"    # syslog z NetDoc → 5141 na hoście (514 zajęty przez run_syslog_relay.py)
      - "55000:55000"     # REST API (do przyszłej integracji)

volumes:
  postgres_data:
  prometheus_data:
  loki_data:
  grafana_data:
  clickhouse_data:
  rsyslog_queue:
  ntopng_data:
  wazuh_data:
  wazuh_logs:
