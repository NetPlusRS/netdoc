[pytest]
testpaths = tests
addopts = --tb=short -v --cov=netdoc --cov-report=term-missing
filterwarnings =
    # SQLite w testach reuzywaja PK=1 po kasowaniu — artefakt testu, nie bug produkcyjny.
    # W PostgreSQL sekwencje nigdy nie reuzywaja ID.
    ignore::sqlalchemy.exc.SAWarning

# ── Logowanie do pliku ────────────────────────────────────────────────────────
# logs/pytest.log — pełny log z ostatniego uruchomienia (nadpisywany)
log_cli = false
log_file = logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s %(levelname)-8s %(name)s — %(message)s
log_file_date_format = %H:%M:%S
