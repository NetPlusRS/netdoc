# NetDoc Test Lab — siec symulowanych urzadzen przemyslowych i sieciowych
#
# URUCHOMIENIE:
#   docker compose -f docker-compose.lab.yml up -d
#
# PODLACZENIE WORKEROW DO LAB-NET (jednorazowo po uruchomieniu):
#   docker network connect netdoc_lab netdoc-snmp
#   docker network connect netdoc_lab netdoc-cred
#   docker network connect netdoc_lab netdoc-vuln
#   docker network connect netdoc_lab netdoc-ping
#
# .env — dodaj podsiec do skanowania:
#   NETWORK_RANGES=["192.168.5.0/24","172.28.0.0/24"]
#
# URZADZENIA (172.28.0.0/24):
#   172.28.0.10  netdoc-lab-plc-s7     Siemens S7-200 PLC   (Modbus/502, S7/102, SNMP, Telnet/23, FTP/21, HTTP/80)
#   172.28.0.11  netdoc-lab-plc-meter  Kamstrup licznik      (Modbus/502, SNMP, HTTP/80)
#   172.28.0.12  netdoc-lab-plc-fuel   Guardian AST zbiornik (Modbus/502, SNMP, HTTP/80)
#   172.28.0.20  netdoc-lab-router     MikroTik RB750 router (SNMP/161, Telnet/23)
#   172.28.0.30  netdoc-lab-ssh        Cisco IOS switch      (SSH/22 — slabe haslo admin/admin)
#   172.28.0.40  netdoc-lab-hmi        Panel HMI WebServer   (HTTP/80 — strona logowania)

name: netdoc-lab

networks:
  lab:
    name: netdoc_lab
    external: true

services:

  # ── Siemens S7-1200 PLC (Modbus/502 + SNMP/161) ─────────────────────────────
  netdoc-lab-plc-s7:
    build:
      context: ./config/lab/plc
      dockerfile: Dockerfile
    image: netdoc-lab-plc-s7
    container_name: netdoc-lab-plc-s7
    restart: unless-stopped
    environment:
      PLC_NAME: "S7-1200"
      PLC_SNMP_DESCR: "Siemens SIMATIC S7-1200 PLC v4.5"
      PLC_SNMP_NAME: "S7-1200-PLC"
      PLC_SNMP_LOC: "Hala produkcyjna A / Szafa sterownicza 1"
    networks:
      lab:
        ipv4_address: 172.28.0.10
    ports:
      - "15502:502"  # Modbus TCP

  # ── Schneider Modicon M340 PLC (licznik energii) ────────────────────────────
  netdoc-lab-plc-meter:
    build:
      context: ./config/lab/plc
      dockerfile: Dockerfile
    image: netdoc-lab-plc-meter
    container_name: netdoc-lab-plc-meter
    restart: unless-stopped
    environment:
      PLC_NAME: "Modicon-M340"
      PLC_SNMP_DESCR: "Schneider Electric Modicon M340 PLC"
      PLC_SNMP_NAME: "Modicon-M340"
      PLC_SNMP_LOC: "Rozdzielnia glowna / Licznik energii"
    networks:
      lab:
        ipv4_address: 172.28.0.11
    ports:
      - "15503:502"  # Modbus TCP

  # ── ABB AC500 PLC (zbiornik/magazyn) ───────────────────────────────────────
  netdoc-lab-plc-fuel:
    build:
      context: ./config/lab/plc
      dockerfile: Dockerfile
    image: netdoc-lab-plc-fuel
    container_name: netdoc-lab-plc-fuel
    restart: unless-stopped
    environment:
      PLC_NAME: "ABB-AC500"
      PLC_SNMP_DESCR: "ABB AC500 PLC v3.0 — Tank Control"
      PLC_SNMP_NAME: "ABB-AC500-Tank"
      PLC_SNMP_LOC: "Zbiornik paliwa / Sekcja B"
    networks:
      lab:
        ipv4_address: 172.28.0.12
    ports:
      - "15504:502"  # Modbus TCP

  # ── MikroTik RB750 router (SNMP + Telnet) ──────────────────────────────────
  netdoc-lab-router:
    build:
      context: ./config/lab/router
      dockerfile: Dockerfile
    image: netdoc-lab-router
    container_name: netdoc-lab-router
    restart: unless-stopped
    networks:
      lab:
        ipv4_address: 172.28.0.20
    ports:
      - "15123:23"   # Telnet routera

  # ── Cisco-like switch (SSH ze slabymi haslami) ─────────────────────────────
  netdoc-lab-ssh:
    build:
      context: ./config/lab/ssh
      dockerfile: Dockerfile
    image: netdoc-lab-ssh
    container_name: netdoc-lab-ssh
    restart: unless-stopped
    networks:
      lab:
        ipv4_address: 172.28.0.30
    ports:
      - "15022:22"   # SSH (lokal: port 15022)

  # ── Panel HMI WebServer (HTTP z formularzem logowania) ────────────────────
  netdoc-lab-hmi:
    image: nginx:alpine
    container_name: netdoc-lab-hmi
    restart: unless-stopped
    volumes:
      - ./config/lab/hmi:/usr/share/nginx/html:ro
      - ./config/lab/hmi/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      lab:
        ipv4_address: 172.28.0.40
    ports:
      - "15040:80"   # HTTP HMI (lokal: port 15040)
