name: Ubiquiti UniFi Switch 8 60W
match_vendors: [Ubiquiti, "Ubiquiti Networks"]
match_models: ["US-8-60W", "US860W", "US-860W"]
match_os: []
tested: true
tested_at: "2026-04-07"
notes: >
  Switch 8-portowy PoE. LLDP widoczny w topology_links (Port6 → U7ProMax).
  FDB przez SNMP — do weryfikacji (Q-BRIDGE może nie być dostępne).
  Brak danych CPU/RAM przez hrProcessorLoad/hrStorageTable.

capabilities:
  snmp: true
  snmp_interfaces: true
  snmp_fdb: false         # Q-BRIDGE nie potwierdzone
  snmp_vlan: false
  snmp_stp: false
  snmp_cpu: false
  snmp_ram: false
  lldp_snmp: false
  lldp_unifi: true        # działa — widoczny w topology_links
  syslog: true
  config_backup: false

relevant_protocols:
  - snmp
  - syslog
  - lldp
