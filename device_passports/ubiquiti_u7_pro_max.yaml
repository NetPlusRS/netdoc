name: Ubiquiti U7 Pro Max
match_vendors: [Ubiquiti, "Ubiquiti Networks"]
match_models: ["U7Pro", "U7-Pro", "U7ProMax", "U7 Pro", "U7 Pro Max"]
match_os: ["U7-Pro-Max", "U7ProMax", "U7 Pro Max"]
tested: true
tested_at: "2026-04-07"
notes: >
  WiFi 7 (802.11be), tri-band. hrProcessorLoad działa (testowane: ~6-8%).
  hrStorageTable pusta — brak RAM przez SNMP.
  Q-BRIDGE-MIB nie zaimplementowane.
  LLDP przez UniFi API — widoczny jako cel linku z US860W Port6.
  Mesh backhaul aktywny — wifi1ap6/7 oraz vwiresta generują błędy (normalnie do ~5000/h).
  Alert threshold podwyższony do 5000 err/h w konfiguracji (mesh WiFi environment).
  SSH dostępne (UniFi firmware, user ubnt lub skonfigurowany w UniFi Controller).

capabilities:
  snmp: true
  snmp_interfaces: true
  snmp_fdb: false         # Q-BRIDGE nie zaimplementowane w UniFi AP firmware
  snmp_vlan: false
  snmp_stp: false
  snmp_cpu: true          # hrProcessorLoad działa
  snmp_ram: false
  snmp_hc_counters: false # brak ifHCInOctets w ClickHouse — tylko 32-bit IF-MIB
  snmp_arp: false         # AP, nie router
  snmp_sensors: false
  lldp_snmp: false
  lldp_unifi: true        # przez UniFi API
  lldp_ssh: false         # brak IOS-style CLI
  syslog: true
  config_backup: false    # brak CLI dostępu do konfiguracji
  ssh: true               # UniFi firmware — dostępne SSH

snmp_collection:
  interfaces:
    hc_counters: false       # brak ifHCInOctets — tylko 32-bit IF-MIB (potwierdzone w ClickHouse)
  cpu:
    enabled: true
    method: host_resources   # hrProcessorLoad działa — testowane: 6-8%
  ram:
    enabled: false           # hrStorageTable puste
  arp:
    enabled: false           # AP, nie router
  sensors:
    enabled: true
    method: ubnt_radio       # ubntRadioTable: noise floor, TX power, freq | ubntStaTable: avg RSSI

relevant_protocols:
  - snmp
  - syslog
  - lldp
