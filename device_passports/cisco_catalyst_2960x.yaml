name: Cisco Catalyst 2960X
match_vendors: [Cisco, "Cisco Systems"]
match_models: ["2960X", "2960-X", "WS-C2960X"]
match_os: ["15.2", "IOS 15"]
tested: true
tested_at: "2026-04-07"
notes: >
  dot1dStpPortRole (OID .6) zwraca 8-bajtowy Bridge ID zamiast roli RSTP (RFC 1493).
  stp_role=null dla wszystkich portów — wyświetlamy tylko stp_state.
  hrProcessorLoad nie zwraca danych (pusty wynik SNMP GET).
  hrStorageTable pusta — brak danych RAM przez SNMP.
  CDP globalnie włączony (cdpGlobalRun=1). LLDP wymaga ręcznego włączenia (lldp run).
  SNMP walk (nextCmd) nie działa w pysnmp-lextudio 6.x — LLDP/CDP przez SNMP niedostępne.

capabilities:
  snmp: true
  snmp_interfaces: true
  snmp_fdb: true
  snmp_vlan: true
  snmp_stp: true          # tylko state, nie role (RFC 1493 — dot1dStpPortRole zwraca Bridge ID)
  snmp_cpu: false         # hrProcessorLoad puste
  snmp_ram: false         # hrStorageTable puste
  snmp_hc_counters: false # tylko 32-bit IF-MIB (in_octets/out_octets), brak ifHCInOctets w ClickHouse
  snmp_arp: true          # ipNetToMediaTable dostępne (switch L3 IOS)
  snmp_sensors: false
  lldp_snmp: false        # nextCmd broken
  lldp_ssh: true          # show lldp neighbors detail (wymaga SSH + lldp run na switchu)
  cdp: true               # cdpGlobalRun=1, działa przez SSH
  syslog: true            # Cisco IOS obsługuje syslog
  config_backup: true     # show running-config przez SSH
  ssh: true               # netmiko cisco_ios

snmp_collection:
  interfaces:
    hc_counters: false       # tylko 32-bit IF-MIB — potwierdzone w ClickHouse
  cpu:
    enabled: true
    method: cisco_process    # CISCO-PROCESS-MIB — cpmCPUTotal5minRev (działa na IOS 15.x)
  ram:
    enabled: true
    method: cisco_memory     # CISCO-MEMORY-POOL-MIB — free+used → mem_used_pct
  arp:
    enabled: true            # ipNetToMediaTable dostępne (IOS L3 switch)
  sensors:
    enabled: true
    method: cisco_envmon     # CISCO-ENVMON-MIB: temperatura chassis + fan + PSU
    oids:
      temp:      "1.3.6.1.4.1.9.9.13.1.3.1.3.1"   # ciscoEnvMonTemperatureStatusValue (°C)
      fan_state: "1.3.6.1.4.1.9.9.13.1.4.1.3.1"   # ciscoEnvMonFanState (1=normal)
      psu_state: "1.3.6.1.4.1.9.9.13.1.5.1.3.1"   # ciscoEnvMonSupplyState (1=normal)
  extra_oids:                # używane przez resource metrics (ClickHouse)
    cpu_5min:  "1.3.6.1.4.1.9.9.109.1.1.1.1.8.1"  # cpmCPUTotal5minRev (%)
    ram_free:  "1.3.6.1.4.1.9.9.48.1.1.1.5.1"      # ciscoMemoryPoolFree (bytes)
    ram_used:  "1.3.6.1.4.1.9.9.48.1.1.1.6.1"      # ciscoMemoryPoolUsed (bytes)

relevant_protocols:        # co jest ważne dla tego typu sprzętu
  - snmp
  - ssh
  - syslog
  - lldp
  - fdb
