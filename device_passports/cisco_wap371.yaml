name: Cisco WAP371
match_vendors: [Cisco, "Cisco Systems"]
match_models: ["WAP371", "WAP371-E"]
match_os: []             # firmware version string (np. "1.3.7.4 (ED7)") nie zawiera nazwy modelu
tested: true
tested_at: "2026-04-07"
notes: >
  Access point klasy SMB (Linux-based, nie IOS).
  SNMP działa — podstawowe dane interfejsów (eth0, wlan0, wlan1, brtrunk).
  Brak Q-BRIDGE, STP, FDB przez SNMP.
  Brak hrProcessorLoad / hrStorageTable.
  Brak CLI przez SSH (mini_httpd web management, port 80/443).
  Klasyfikowany błędnie jako router przez "Cisco" w sysDescr — naprawiono (WAP = ap).

capabilities:
  snmp: true
  snmp_interfaces: true
  snmp_fdb: false
  snmp_vlan: false
  snmp_stp: false
  snmp_cpu: false
  snmp_ram: false
  snmp_hc_counters: false # brak ifHCInOctets — podstawowy IF-MIB tylko
  snmp_arp: false         # AP, nie router
  snmp_sensors: false
  lldp_snmp: false
  lldp_unifi: false
  syslog: true
  config_backup: false
  ssh: false              # brak IOS CLI

snmp_collection:
  interfaces:
    hc_counters: false       # podstawowy IF-MIB — brak ifHCInOctets
  cpu:
    enabled: false           # brak hrProcessorLoad/hrStorageTable — potwierdzone
  ram:
    enabled: false
  arp:
    enabled: false           # AP, nie router
  sensors:
    enabled: false

relevant_protocols:
  - snmp
  - syslog
