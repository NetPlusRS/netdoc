server {
    listen 80;
    server_name _;

    client_max_body_size 100m;   # upload backupu przez NetDoc

    # ── NetDoc web ──────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://netdoc-web:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;    # backup restore może trwać dłużej
    }

    # ── Grafana ─────────────────────────────────────────────────────────────
    location /grafana/ {
        proxy_pass         http://netdoc-grafana:3000/grafana/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Grafana Live — WebSocket (live streaming paneli)
    location /grafana/api/live/ {
        proxy_pass         http://netdoc-grafana:3000/grafana/api/live/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }
}
