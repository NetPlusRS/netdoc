server {
    listen 80;
    server_name _;

    client_max_body_size 100m;   # upload backupu przez NetDoc

    # Docker internal DNS resolver — re-resolves hostnames on each request
    # so nginx does not cache stale IPs after container restarts.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── NetDoc web ──────────────────────────────────────────────────────────
    location / {
        set $upstream_web http://netdoc-web:5000;
        proxy_pass         $upstream_web;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Grafana ─────────────────────────────────────────────────────────────
    location /grafana/ {
        set $upstream_grafana http://netdoc-grafana:3000;
        proxy_pass         $upstream_grafana;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Grafana Live — WebSocket
    location /grafana/api/live/ {
        set $upstream_grafana http://netdoc-grafana:3000;
        proxy_pass         $upstream_grafana;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }
}
