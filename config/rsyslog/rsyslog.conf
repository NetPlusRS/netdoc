# NetDoc rsyslog — production syslog receiver
# Role: receives syslog from network devices (UDP/TCP 514),
#       buffers to disk and reliably forwards to Vector (TCP 6514).

# ─── Modules ─────────────────────────────────────────────────────────────────
module(load="imudp")          # UDP receiver
module(load="imtcp")          # TCP receiver

# ─── Working directory (disk queues) ─────────────────────────────────────────
global(workDirectory="/var/spool/rsyslog")

# ─── Inputs ──────────────────────────────────────────────────────────────────
#
# Port 514  — direct syslog from network devices (TCP only; UDP 514 is handled
#             by run_syslog_relay.py on the Windows host to preserve real IPs).
# Port 5140 — relay input from run_syslog_relay.py (UDP, localhost only).
#             Messages arrive with real device IP already in HOSTNAME field.
input(type="imtcp" port="514"  ruleset="forward_to_vector")
input(type="imudp" port="5140" ruleset="relay_from_host")

# ─── Template: one JSON line per message (Vector decodes as JSON) ─────────────
template(name="json_line" type="list") {
    constant(value="{")
    property(name="timereported" dateFormat="rfc3339"    format="jsonf" outname="timestamp")
    constant(value=",")
    property(name="fromhost-ip"                          format="jsonf" outname="src_ip")
    constant(value=",")
    property(name="hostname"                             format="jsonf" outname="hostname")
    constant(value=",")
    property(name="syslogfacility"                       format="jsonf" outname="facility")
    constant(value=",")
    property(name="syslogseverity"                       format="jsonf" outname="severity")
    constant(value=",")
    property(name="programname"                          format="jsonf" outname="program")
    constant(value=",")
    property(name="msg"          position.from="2"       format="jsonf" outname="message")
    constant(value="}\n")
}

# ─── Ruleset: disk queue + forward to Vector ─────────────────────────────────
ruleset(name="forward_to_vector") {

    # Drop garbage — raw HTTP/RTSP/SIP/protocol traffic misdirected to syslog port 514.
    # These arrive when scanners or devices accidentally probe port 514 with non-syslog
    # protocols. They parse as syslog with HTTP method as hostname (GET, POST, OPTIONS…).
    if $hostname contains_i "GET" or
       $hostname contains_i "POST" or
       $hostname contains_i "PUT" or
       $hostname contains_i "DELETE" or
       $hostname contains_i "HEAD" or
       $hostname contains_i "OPTIONS" or
       $hostname contains_i "CONNECT" or
       $hostname contains_i "TRACE" or
       $hostname contains_i "REGISTER" or
       $hostname contains_i "INVITE" or
       $hostname contains_i "NOTIFY" or
       $hostname contains_i "SUBSCRIBE" then stop

    # Drop nmap/compiler binary garbage (DIST00000001ARGC… pattern from Modbus/DVRIP scanners)
    if $hostname startswith "DIST0" then stop

    action(
        type="omfwd"
        # Uses Docker DNS — Vector is reachable by service name within the netdoc network.
        # Bridge networking with explicit port bindings (see docker-compose.yml).
        target="netdoc-vector"
        port="6514"
        protocol="tcp"
        template="json_line"

        # Disk queue — messages are not lost when Vector/ClickHouse is unavailable
        queue.type="LinkedList"
        queue.filename="fwd_to_vector"          # file prefix on disk
        queue.maxDiskSpace="2g"                 # max 2 GB on disk
        queue.size="1000000"                    # max 1M messages in memory
        queue.highWatermark="800000"
        queue.lowWatermark="200000"
        queue.saveOnShutdown="on"               # flush to disk on shutdown
        queue.dequeueBatchSize="1000"

        # Retry — never gives up
        action.resumeRetryCount="-1"            # -1 = infinite retry
        action.resumeInterval="10"              # retry every 10s
    )
}

# ─── Template: relay path — hostname = real device IP → use as src_ip ────────
#
# The Windows relay (run_syslog_relay.py) replaces the syslog HOSTNAME field
# with the real sender IP before forwarding here.  This template maps that
# hostname value to the src_ip JSON key so ClickHouse receives the correct IP.
template(name="json_line_relay" type="list") {
    constant(value="{")
    property(name="timereported" dateFormat="rfc3339"    format="jsonf" outname="timestamp")
    constant(value=",")
    property(name="hostname"                             format="jsonf" outname="src_ip")
    constant(value=",")
    property(name="hostname"                             format="jsonf" outname="hostname")
    constant(value=",")
    property(name="syslogfacility"                       format="jsonf" outname="facility")
    constant(value=",")
    property(name="syslogseverity"                       format="jsonf" outname="severity")
    constant(value=",")
    property(name="programname"                          format="jsonf" outname="program")
    constant(value=",")
    property(name="msg"          position.from="2"       format="jsonf" outname="message")
    constant(value="}\n")
}

# ─── Ruleset: relay path from Windows host ────────────────────────────────────
ruleset(name="relay_from_host") {
    # Drop garbage — same patterns as main ruleset
    if $hostname contains_i "GET" or
       $hostname contains_i "POST" or
       $hostname contains_i "PUT" or
       $hostname contains_i "DELETE" or
       $hostname contains_i "HEAD" or
       $hostname contains_i "OPTIONS" or
       $hostname contains_i "CONNECT" or
       $hostname contains_i "TRACE" or
       $hostname contains_i "REGISTER" or
       $hostname contains_i "INVITE" or
       $hostname contains_i "NOTIFY" or
       $hostname contains_i "SUBSCRIBE" then stop

    if $hostname startswith "DIST0" then stop

    action(
        type="omfwd"
        target="netdoc-vector"
        port="6514"
        protocol="tcp"
        template="json_line_relay"

        queue.type="LinkedList"
        queue.filename="fwd_relay_to_vector"
        queue.maxDiskSpace="500m"
        queue.size="500000"
        queue.saveOnShutdown="on"
        queue.dequeueBatchSize="1000"

        action.resumeRetryCount="-1"
        action.resumeInterval="10"
    )
}

# ─── Suppress rsyslog's own log messages (do not forward to Vector) ──────────
:syslogtag, contains, "rsyslogd" stop
