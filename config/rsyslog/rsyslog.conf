# NetDoc rsyslog — production syslog receiver
# Rola: przyjmuje syslog od urządzeń sieciowych (UDP/TCP 514),
#        buforuje na dysku i niezawodnie forward-uje do Vector (TCP 6514).
# network_mode: host — zachowuje prawdziwe src_ip urządzeń (bez Docker NAT)

# ─── Moduły ──────────────────────────────────────────────────────────────────
module(load="imudp")          # odbiór UDP
module(load="imtcp")          # odbiór TCP

# ─── Katalog roboczy (kolejki dyskowe) ───────────────────────────────────────
global(workDirectory="/var/spool/rsyslog")

# ─── Odbiór ──────────────────────────────────────────────────────────────────
input(type="imudp" port="514" ruleset="forward_to_vector")
input(type="imtcp" port="514" ruleset="forward_to_vector")

# ─── Template: JSON linia po linii (Vector dekoduje jako JSON) ────────────────
template(name="json_line" type="list") {
    constant(value="{")
    property(name="timereported" dateFormat="rfc3339"    format="jsonf" outname="timestamp")
    constant(value=",")
    property(name="fromhost-ip"                          format="jsonf" outname="src_ip")
    constant(value=",")
    property(name="hostname"                             format="jsonf" outname="hostname")
    constant(value=",")
    property(name="syslogfacility"                       format="jsonf" outname="facility")
    constant(value=",")
    property(name="syslogseverity"                       format="jsonf" outname="severity")
    constant(value=",")
    property(name="programname"                          format="jsonf" outname="program")
    constant(value=",")
    property(name="msg"          position.from="2"       format="jsonf" outname="message")
    constant(value="}\n")
}

# ─── Ruleset: kolejka dyskowa + forward do Vector ────────────────────────────
# host network: target=127.0.0.1 dosięga Vector przez opublikowany port 6514
ruleset(name="forward_to_vector") {
    action(
        type="omfwd"
        # 127.0.0.1 zamiast nazwy serwisu Docker — rsyslog działa z network_mode:host
        # i nie ma dostępu do Docker DNS. Vector publikuje port 6514 na hoście.
        target="127.0.0.1"
        port="6514"
        protocol="tcp"
        template="json_line"

        # Kolejka dyskowa — logi nie giną gdy Vector/ClickHouse jest niedostępny
        queue.type="LinkedList"
        queue.filename="fwd_to_vector"          # prefix pliku na dysku
        queue.maxDiskSpace="2g"                 # max 2 GB na dysku
        queue.size="1000000"                    # max 1M wiadomości w pamięci
        queue.highWatermark="800000"
        queue.lowWatermark="200000"
        queue.saveOnShutdown="on"               # flush na dysk przy zatrzymaniu
        queue.dequeueBatchSize="1000"

        # Retry — nigdy nie odpuszcza
        action.resumeRetryCount="-1"            # -1 = infinite retry
        action.resumeInterval="10"              # co 10s próba ponowienia
    )
}

# ─── Wycisz własne logi rsyslog (nie forward-uj do Vector) ───────────────────
:syslogtag, contains, "rsyslogd" stop
