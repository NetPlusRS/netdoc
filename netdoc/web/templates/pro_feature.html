{% extends "base.html" %}
{% block content %}
<div class="container-fluid mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card border-0 shadow-sm text-center py-5">
        <div class="card-body px-5">
          <i class="bi bi-lock-fill text-warning" style="font-size:3rem"></i>
          <h3 class="mt-3 fw-bold">{{ feature }}</h3>
          <p class="text-muted mt-2">{{ description }}</p>
          <hr class="my-4">
          <p class="small text-muted">
            Ta funkcja jest dostepna wylacznie w wersji <strong>NetDoc Pro</strong>.<br>
            Skontaktuj sie z dostawca aby uzyskac licencje.
          </p>
          <div class="d-grid gap-2 mt-3">
            <a href="mailto:kontakt@netdoc.pl" class="btn btn-primary">
              <i class="bi bi-envelope me-1"></i>Zapytaj o licencje Pro
            </a>
            <a href="/" class="btn btn-outline-secondary btn-sm">
              <i class="bi bi-arrow-left me-1"></i>Wróc do Dashboard
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
